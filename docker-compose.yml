version: '3.8'

services:
  web:
    image: php:8.1-apache
    volumes:
      - .:/var/www/html
    ports:
      - "8000:80"
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - covid_network
    command: >
      bash -c "docker-php-ext-install mysqli && docker-php-ext-enable mysqli && apache2-foreground"

  db:
    image: mariadb:10.5
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: filter_system
    volumes:
      - ./database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - covid_network

networks:
  covid_network:
    driver: bridge
